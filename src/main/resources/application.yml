spring:
  application:
    name: biblioteca-api
  datasource:
    url: jdbc:h2:mem:biblioteca_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  integracoes:
    google-books:
      base-url: https://www.googleapis.com/books/v1
      api-key: ${GOOGLE_BOOKS_API_KEY:}
    open-library:
      base-url: https://openlibrary.org
